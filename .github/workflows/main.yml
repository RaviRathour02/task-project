name: Java CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  APP_NAME: sample-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ---------------- Checkout ----------------
    - name: Checkout source code
      uses: actions/checkout@v4

    # ---------------- Java & Maven ----------------
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    # ---------------- Maven Build ----------------
    - name: Maven Compile
      run: mvn clean compile

    # ---------------- Unit Tests ----------------
    - name: Unit Tests
      run: mvn test

    # ---------------- Functional Tests ----------------
    - name: Functional Tests
      run: mvn verify -Pfunctional

    # ---------------- Performance Tests (non-blocking) ----------------
    - name: Performance Tests
      continue-on-error: true
      run: |
        sudo apt-get update
        sudo apt-get install -y jmeter
        jmeter -n -t perf.jmx -l perf.jtl

    # ---------------- SonarQube Scan ----------------
    - name: SonarQube Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=${APP_NAME} \
          -Dsonar.host.url=http://13.201.28.158:9000 \
          -Dsonar.login=$SONAR_TOKEN

    # ---------------- Docker Build ----------------
    - name: Docker Build
      run: |
        docker build -t ${APP_NAME}:${{ github.run_number }} .
